services:
  custom-404:
    image: nginx:alpine
    networks:
      - dokploy-network
    volumes:
      - ./404.html:/usr/share/nginx/html/index.html
labels:
      - "traefik.enable=true"
      - "traefik.http.routers.catchall.rule=HostRegexp(`{host:.+}`)"
      - "traefik.http.routers.catchall.priority=1"
      - "traefik.http.routers.catchall.entrypoints=web,websecure"
      - "traefik.http.services.catchall.loadbalancer.server.port=80"
      - "traefik.docker.network=dokploy-network"

networks:
  dokploy-network:
    external: true
