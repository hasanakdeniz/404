<!DOCTYPE html><html lang="auto" class="scroll-smooth overflow-x-hidden"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title id="htmlTitle">Bakım Modu</title><script src="https://cdn.tailwindcss.com"></script><style>:root{--theme:#40E0D0;}@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-15px);}}.animate-float{animation:float 4s ease-in-out infinite;}@keyframes wiggle{0%,100%{transform:rotate(-5deg);}50%{transform:rotate(5deg) scale(1.1);}}.animate-wiggle{animation:wiggle 2s ease-in-out infinite;}.modal-enter{animation:slideUp 0.4s cubic-bezier(0.16,1,0.3,1) forwards;}@keyframes slideUp{from{transform:translateY(100%);opacity:0;}to{transform:translateY(0);opacity:1;}}.progress-bar-anim{animation:progress 2s ease-in-out infinite;}@keyframes progress{0%{transform:translateX(-100%);}50%{transform:translateX(0%);}100%{transform:translateX(100%);}}</style></head><body class="bg-gray-50 text-[color:var(--theme)] font-sans selection:bg-[color:var(--theme)] selection:text-white overflow-x-hidden max-w-full transition-colors duration-500 min-h-screen flex items-center justify-center p-6"><div class="bg-white p-8 md:p-12 border-4 border-[color:var(--theme)] shadow-[12px_12px_0_0_var(--theme)] rounded-2xl max-w-lg w-full text-center relative transition-transform duration-500 hover:-translate-y-2"><div class="text-6xl animate-float mb-6 emoji" id="emoji">⚙️</div><h1 id="title" class="text-4xl md:text-5xl font-black uppercase tracking-tighter text-[color:var(--theme)] mb-4">Sistem Bakımda</h1><div id="siteNameDisplay" class="inline-block px-4 py-2 bg-[color:var(--theme)] text-white text-xs font-bold uppercase tracking-widest rounded-full mb-6">SITEMIZ</div><p id="message" class="text-gray-700 text-lg font-medium leading-relaxed mb-8"></p><div class="h-6 border-4 border-[color:var(--theme)] rounded-full overflow-hidden p-0.5 mb-8 bg-gray-50 relative"><div class="bg-[color:var(--theme)] h-full w-full rounded-full progress-bar-anim absolute top-0 left-0"></div></div><div class="text-gray-500 font-bold text-xs uppercase tracking-widest mb-6">© <span id="currentYear"></span> • <span id="copyrightSiteName">SITEMIZ</span> • <span id="copyrightText"></span></div><div class="flex flex-col md:flex-row justify-center gap-4 text-xs font-bold uppercase tracking-widest"><button id="privacyPolicyLink" class="text-gray-500 hover:text-[color:var(--theme)] transition-colors"></button><button id="termsOfUseLink" class="text-gray-500 hover:text-[color:var(--theme)] transition-colors"></button></div><div class="mt-6 text-[10px] font-bold text-gray-400 uppercase tracking-widest"><span id="voidLinuxNote"></span> - <a href="https://voidlinux.org/" target="_blank" class="hover:text-[#4CAF50] transition-colors">voidlinux.org</a></div></div><div id="privacyModal" class="fixed inset-0 z-50 bg-white/90 backdrop-blur-sm hidden flex-col justify-center items-center p-4 md:p-6 transition-all"><div class="bg-white border-4 border-[color:var(--theme)] shadow-[8px_8px_0_0_var(--theme)] p-8 max-w-2xl w-full rounded-2xl max-h-[85vh] overflow-y-auto modal-enter"><div class="text-center mb-8 border-b-4 border-gray-100 pb-6"><div class="text-5xl animate-wiggle mb-4">🔒</div><h3 class="text-3xl font-black uppercase tracking-tighter text-[color:var(--theme)]" id="privacyModalTitle"></h3><div class="text-sm font-bold text-gray-400 uppercase tracking-widest mt-2"><span id="privacyDatePrefix"></span> <span id="privacyDate"></span></div></div><div id="privacyModalBody" class="text-gray-700 font-medium space-y-4 text-sm md:text-base leading-relaxed"></div><button class="mt-8 w-full py-4 bg-[color:var(--theme)] text-white font-bold tracking-widest uppercase rounded-xl hover:-translate-y-1 active:translate-y-0 transition-all shadow-[4px_4px_0_0_#000] border-2 border-black" id="privacyModalClose" onclick="closeModal('privacyModal')"></button></div></div><div id="termsModal" class="fixed inset-0 z-50 bg-white/90 backdrop-blur-sm hidden flex-col justify-center items-center p-4 md:p-6 transition-all"><div class="bg-white border-4 border-[color:var(--theme)] shadow-[8px_8px_0_0_var(--theme)] p-8 max-w-2xl w-full rounded-2xl max-h-[85vh] overflow-y-auto modal-enter"><div class="text-center mb-8 border-b-4 border-gray-100 pb-6"><div class="text-5xl animate-wiggle mb-4">📄</div><h3 class="text-3xl font-black uppercase tracking-tighter text-[color:var(--theme)]" id="termsModalTitle"></h3><div class="text-sm font-bold text-gray-400 uppercase tracking-widest mt-2"><span id="termsDatePrefix"></span> <span id="termsDate"></span></div></div><div id="termsModalBody" class="text-gray-700 font-medium space-y-4 text-sm md:text-base leading-relaxed"></div><button class="mt-8 w-full py-4 bg-[color:var(--theme)] text-white font-bold tracking-widest uppercase rounded-xl hover:-translate-y-1 active:translate-y-0 transition-all shadow-[4px_4px_0_0_#000] border-2 border-black" id="termsModalClose" onclick="closeModal('termsModal')"></button></div></div><script>function getSiteNameFromURL(){let s=window.location.hostname.replace(/^www\./,'').split('.')[0];return(s||"SITEMIZ").toUpperCase();}function getBrowserLanguage(){let l=(navigator.language||navigator.userLanguage).split('-')[0];return['tr','en','de','fr','es','it','ja','ko','ar','ru'].includes(l)?l:'en';}const siteName=getSiteNameFromURL();const currentLang=getBrowserLanguage();const translations={tr:{htmlTitle:"SITEMIZ - Bakım Modu",title:"Sistem Bakımda",message:"Web sitemiz şu anda planlı bakım çalışmaları nedeniyle geçici olarak kullanılamıyor.",copyright:"Tüm hakları saklıdır.",privacyPolicy:"Gizlilik Politikası",termsOfUse:"Kullanım Koşulları",voidNote:"Void Linux'u seviyoruz!",privacyModalClose:"- KAPAT -",termsModalClose:"- KAPAT -",lastUpdate:"Son güncelleme:"},en:{htmlTitle:"SITEMIZ - Maintenance Mode",title:"System Maintenance",message:"Our website is currently unavailable due to planned maintenance work.",copyright:"All rights reserved.",privacyPolicy:"Privacy Policy",termsOfUse:"Terms of Use",voidNote:"We love Void Linux!",privacyModalClose:"- CLOSE -",termsModalClose:"- CLOSE -",lastUpdate:"Last update:"}};const t=translations[currentLang]||translations['en'];const pc={tr:`<h3 class="text-lg font-black uppercase text-[color:var(--theme)]">Veri Toplama</h3><p>SITEMIZ olarak, ziyaretçilerimizin gizliliğine önem veriyoruz.</p><ul class="list-disc pl-5 font-bold text-gray-600 mt-2"><li>IP adresi (anonimleştirilmiş)</li><li>Tarayıcı türü ve versiyonu</li><li>Ziyaret saati ve tarihi</li></ul><h3 class="text-lg font-black uppercase text-[color:var(--theme)] mt-4">Veri Güvenliği</h3><p>Topladığımız sınırlı veriler uygun güvenlik önlemleriyle korunmaktadır.</p>`,en:`<h3 class="text-lg font-black uppercase text-[color:var(--theme)]">Data Collection</h3><p>At SITEMIZ, we value our visitors' privacy.</p><ul class="list-disc pl-5 font-bold text-gray-600 mt-2"><li>IP address (anonymized)</li><li>Browser type and version</li><li>Visit time and date</li></ul><h3 class="text-lg font-black uppercase text-[color:var(--theme)] mt-4">Data Security</h3><p>Protected with appropriate security measures.</p>`};const tc={tr:`<h3 class="text-lg font-black uppercase text-[color:var(--theme)]">Kabul</h3><p>Bu bakım sayfasını kullanarak kullanım koşullarını kabul etmiş olursunuz.</p><h3 class="text-lg font-black uppercase text-[color:var(--theme)] mt-4">Kullanıcı Sorumlulukları</h3><ul class="list-disc pl-5 font-bold text-gray-600 mt-2"><li>Sayfayı kötüye kullanmamayı kabul edersiniz</li><li>Otomatik botlar kullanmayacaksınız</li></ul>`,en:`<h3 class="text-lg font-black uppercase text-[color:var(--theme)]">Acceptance</h3><p>By using this page, you accept the terms of use.</p><h3 class="text-lg font-black uppercase text-[color:var(--theme)] mt-4">User Responsibilities</h3><ul class="list-disc pl-5 font-bold text-gray-600 mt-2"><li>Not misuse the page</li><li>Not use automated bots</li></ul>`};document.addEventListener('DOMContentLoaded',()=>{document.getElementById('htmlTitle').textContent=t.htmlTitle.replace('SITEMIZ',siteName);document.getElementById('title').textContent=t.title.replace('SITEMIZ',siteName);document.getElementById('message').textContent=t.message;document.getElementById('copyrightText').textContent=t.copyright;document.getElementById('privacyPolicyLink').textContent=t.privacyPolicy;document.getElementById('termsOfUseLink').textContent=t.termsOfUse;document.getElementById('voidLinuxNote').textContent=t.voidNote;document.getElementById('privacyModalClose').textContent=t.privacyModalClose;document.getElementById('termsModalClose').textContent=t.termsModalClose;document.getElementById('siteNameDisplay').textContent=siteName;document.getElementById('copyrightSiteName').textContent=siteName;document.getElementById('currentYear').textContent=new Date().getFullYear();document.getElementById('privacyModalTitle').textContent=t.privacyPolicy;document.getElementById('termsModalTitle').textContent=t.termsOfUse;document.getElementById('privacyDatePrefix').textContent=t.lastUpdate;document.getElementById('termsDatePrefix').textContent=t.lastUpdate;document.getElementById('privacyModalBody').innerHTML=(pc[currentLang]||pc['en']).replace(/SITEMIZ/g,siteName);document.getElementById('termsModalBody').innerHTML=(tc[currentLang]||tc['en']).replace(/SITEMIZ/g,siteName);let d=new Date().toLocaleDateString(currentLang);document.getElementById('privacyDate').textContent=d;document.getElementById('termsDate').textContent=d;rotateEmoji();});function rotateEmoji(){let e=['⚙️','🔧','🛠️','⏳','📱','💻'],i=0,el=document.getElementById('emoji');setInterval(()=>{i=(i+1)%e.length;el.textContent=e[i];},5000);}document.getElementById('privacyPolicyLink').addEventListener('click',e=>{e.preventDefault();openModal('privacyModal');});document.getElementById('termsOfUseLink').addEventListener('click',e=>{e.preventDefault();openModal('termsModal');});function openModal(id){let m=document.getElementById(id);m.classList.remove('hidden');m.classList.add('flex');}function closeModal(id){let m=document.getElementById(id);m.classList.add('hidden');m.classList.remove('flex');}document.addEventListener('click',e=>{if(e.target.id==='privacyModal'||e.target.id==='termsModal')closeModal(e.target.id);});</script></body></html>
